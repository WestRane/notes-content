name: Notify website

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WEB_REPO_PAT }}
          repository: WestRane/notes-web
          event-type: content-updated
